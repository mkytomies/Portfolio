name: CI
on: [push]
jobs: 
  lint: 
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v5
      - run: npm ci
      - run: npm run lint
  component_test:
    runs-on: ubuntu-latest
    needs: lint
    steps: 
        - uses: actions/checkout@v5
        - run: npm ci
        - run: npm test
  e2e_test:
    runs-on: ubuntu-latest
    needs: component_test
    steps:
        - name: Checkout
          uses: actions/checkout@v5
        - name: Cypress run
          uses: cypress-io/github-action@v7
          with: 
            working-directory: ./dist
            build: npx cypress info