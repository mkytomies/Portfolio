name: Deployment
on: [push]
jobs: 
  lint: 
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v5
      - run: npm ci
      - run: npm run lint
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps: 
      - uses: actions/checkout@v5
      - run: npm ci
      - run: npm test
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - run: npm ci
      - run: echo "Deploying application..."    
